<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#090a0d" />
    <meta name="description" content="After Midnight, Detective — a mystery-noir game." />
    <title>After Midnight, Detective</title>
  </head>
  <body>
    <main id="game" aria-label="After Midnight, Detective"></main>
    <aside id="rotate-device" role="status" aria-live="polite">
      <span class="rotate-device__icon" data-qa-id="rotate-icon" aria-hidden="true">▰</span>
      <strong data-qa-id="rotate-title">ROTATE DEVICE</strong>
      <span data-qa-id="rotate-copy">The night reads better in landscape.</span>
    </aside>
    <nav id="mobile-controls" aria-label="Mobile game controls">
      <div class="mobile-controls__dpad" data-qa-id="dpad" role="group" aria-label="Movement joystick">
        <span class="dpad-center" data-qa-id="joystick-knob" aria-hidden="true"></span>
      </div>
      <div class="mobile-controls__actions">
        <button class="action-b" data-game-control="action-b" data-qa-id="action-b" aria-label="Back or pause">
          <strong>B</strong><span>PAUSE</span>
        </button>
        <button class="action-a" data-game-control="action-a" data-qa-id="action-a" aria-label="Interact or continue">
          <strong>A</strong><span>ACT</span>
        </button>
      </div>
    </nav>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
